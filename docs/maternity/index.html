---
title: Barselsplanlægger
layout: default
---

<div class="container">
  <h1>Barselsplanlægger</h1>

  <form>
    <label>
      Termin
      <input type="date" />
    </label>

    <label>
      Orlov med løn inden fødslen
      <input type="number" />
    </label>

    <label>
      Orlov med løn efter fødslen
      <input type="number" />
    </label>
  </form>
</div>

<div id="app">
  <date />

  (( message ))
  <button-counter />
</div>

<template id="clicker">
  <button @click="count++">You clicked me (( count )) times.</button>
</template>

<script type="module">
  import { createApp, ref } from './vue.js'
  import Date from './date.js'

  createApp({
    compilerOptions: {
      delimiters: ["((","))"],
    },
    components: {
      Date,
      ButtonCounter: { 
        setup() {
          const count = ref(0)
          return { count }
        },
        template: "#clicker"
      }
    },
    setup() {
      const message = ref('Hello Vue!')
      return {
        message
      }
    }
  })
  .mount('#app')
</script>
