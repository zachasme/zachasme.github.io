---
title: Barselsplanlægger
layout: default
---

<div class="container">
  <h1>Barselsplanlægger</h1>

  <form>
    <label>
      Termin
      <input type="date" />
    </label>

    <label>
      Orlov med løn inden fødslen
      <input type="number" />
    </label>

    <label>
      Orlov med løn efter fødslen
      <input type="number" />
    </label>
  </form>
</div>

<div id="app">(( message ))</div>

<template id="clicker">
  <button @click="count++">You clicked me {{ count }} times.</button>
</template>

<script type="module">
  import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'

  createApp({
    compilerOptions: {
        delimiters: ["((","))"],
    },
    setup() {
      const message = ref('Hello Vue!')
      return {
        message
      }
    }
  })
  .component({ ButtonCounter: { template: "#clicker" }})
  .mount('#app')
</script>
